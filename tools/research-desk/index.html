<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Research Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fbf7eb;
  --white: #ffffff;
  --border: #e2e0d8;
  --text: #141414;
  --muted: #64748b;
  --light: #9e9e9e;
  --green: #2f7d31;
  --red: #c6392c;
  --amber: #f97316;
  --blue: #1e293b;
  --shadow: 0 1px 4px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Mono', 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  padding: 24px 20px 48px;
}
.page-header {
  max-width: 900px;
  margin: 0 auto 28px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 12px;
}
.page-header-text h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}
.page-header-text p {
  margin-top: 6px;
  color: var(--muted);
  font-size: 12.5px;
}
.run-btn {
  background: var(--blue);
  color: #fff;
  border: none;
  padding: 9px 18px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s;
  font-family: 'IBM Plex Mono', monospace;
}
.run-btn:hover { background: #0f172a; }
.run-btn:disabled { background: #9e9e9e; cursor: default; }
#scan-status {
  font-size: 12px;
  color: var(--muted);
  margin-top: 5px;
  text-align: right;
  min-height: 18px;
}
.grid {
  max-width: 900px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 18px 20px;
  text-decoration: none;
  color: inherit;
  display: block;
  transition: box-shadow 0.18s, border-color 0.18s, transform 0.18s;
  box-shadow: var(--shadow);
}
.card:hover {
  box-shadow: var(--shadow-md);
  border-color: #9e9e9e;
  transform: translateY(-1px);
}
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
}
.card-ticker { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
.card-company { font-size: 11px; color: var(--muted); margin-top: 3px; }
.card-date { font-size: 11px; color: var(--light); text-align: right; }
.scores { display: flex; gap: 10px; margin-bottom: 14px; }
.score-block {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 10px;
  text-align: center;
}
.score-num { font-size: 20px; font-weight: 800; line-height: 1; }
.score-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }
.score-bias { font-size: 9.5px; font-weight: 600; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
.bull { color: var(--green); }
.bear { color: var(--red); }
.neut { color: var(--amber); }
.card-footer {
  font-size: 11px;
  color: var(--muted);
  border-top: 1px solid var(--border);
  padding-top: 10px;
  display: flex;
  justify-content: flex-end;
  align-items: center;
}
.view-report { font-size: 11px; font-weight: 600; color: var(--blue); }
#loading-msg {
  max-width: 900px;
  margin: 0 auto;
  color: var(--muted);
  padding: 20px 0;
  font-size: 13px;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: 4px;
  padding: 28px 28px 24px;
  max-width: 380px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.modal p { font-size: 12.5px; color: var(--muted); margin-bottom: 18px; }
.modal input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 9px 12px;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  outline: none;
  color: var(--text);
  background: var(--bg);
  margin-bottom: 16px;
}
.modal input:focus { border-color: var(--blue); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.modal-cancel { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 8px 16px; font-size: 13px; cursor: pointer; }
.modal-go { background: var(--blue); color: #fff; border: none; border-radius: 4px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
.modal-go:disabled { background: #94a3b8; cursor: default; }
#modal-status { font-size: 12px; color: var(--muted); margin-bottom: 12px; min-height: 18px; }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-text">
    <h1>🔬 Quant Research Desk</h1>
    <p>Self-contained quantitative equity reports — Tape Score (near-term) &amp; Thesis Score (medium/LEAP).</p>
  </div>
  <div>
    <button class="run-btn" id="run-btn" onclick="openModal()">+ Run New Report</button>
    <button class="run-btn" onclick="resetGhToken()" style="background:#334155;font-size:11px;padding:6px 14px;margin-left:6px;" title="Clear saved GitHub token">🔑 Reset Token</button>
    <div id="scan-status"></div>
  </div>
</div>

<div id="loading-msg">Loading reports…</div>
<div class="grid" id="cards-grid"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>Run New Report</h2>
    <p>Enter a ticker symbol. The report will be generated via GitHub Actions (~90s) and appear here when complete.</p>
    <input type="text" id="ticker-input" placeholder="e.g. NVDA" maxlength="10" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')startReport()">
    <div id="modal-status"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-go" id="modal-go-btn" onclick="startReport()">Generate →</button>
    </div>
  </div>
</div>

<script>
const GH_REPO  = 'sampandey404/LuNova-Trades';
const sleep = ms => new Promise(r => setTimeout(r, ms));
function getGhToken(){
  let t=localStorage.getItem('gh_pat_v3');
  if(!t){
    t=prompt('Paste your GitHub PAT (needs "workflow" + "repo" scopes):\n\nCreate one at: github.com/settings/tokens → Generate new token (classic)\nCheck: repo, workflow');
    if(t) localStorage.setItem('gh_pat_v3', t.trim());
  }
  return t ? t.trim() : null;
}
function resetGhToken(){
  localStorage.removeItem('gh_pat_v3');
  alert('Token cleared. Enter a new one when prompted.');
}

function scoreBias(score) {
  if (score >= 70) return 'bull';
  if (score >= 50) return 'neut';
  return 'bear';
}

function scoreLabel(score) {
  if (score >= 70) return 'Bullish';
  if (score >= 55) return 'Leaning Bullish';
  if (score >= 45) return 'Neutral';
  if (score >= 30) return 'Leaning Bearish';
  return 'Bearish';
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function buildCard(r) {
  const tapeBias = scoreBias(r.tape);
  const thesisBias = scoreBias(r.thesis);
  const tapeLabel = r.tapeLabel || scoreLabel(r.tape);
  const thesisLabel = r.thesisLabel || scoreLabel(r.thesis);
  return `<a class="card" href="${r.file}">
    <div class="card-top">
      <div>
        <div class="card-ticker">$${r.ticker}</div>
        <div class="card-company">${r.company}</div>
      </div>
      <div class="card-date">${formatDate(r.date)}</div>
    </div>
    <div class="scores">
      <div class="score-block">
        <div class="score-num ${tapeBias}">${r.tape}</div>
        <div class="score-lbl">Tape Score</div>
        <div class="score-bias ${tapeBias}">${tapeLabel}</div>
      </div>
      <div class="score-block">
        <div class="score-num ${thesisBias}">${r.thesis}</div>
        <div class="score-lbl">Thesis Score</div>
        <div class="score-bias ${thesisBias}">${thesisLabel}</div>
      </div>
    </div>
    <div class="card-footer">
      <span class="view-report">View Report →</span>
    </div>
  </a>`;
}

async function loadManifest() {
  const url = `https://raw.githubusercontent.com/${GH_REPO}/main/public/tools/research-desk/manifest.json?t=${Date.now()}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function renderReports() {
  const loadingEl = document.getElementById('loading-msg');
  const grid = document.getElementById('cards-grid');
  try {
    const manifest = await loadManifest();
    const reports = (manifest.reports || []).slice().sort((a,b) => b.date.localeCompare(a.date));
    loadingEl.style.display = 'none';
    grid.innerHTML = reports.map(buildCard).join('');
  } catch(e) {
    loadingEl.innerHTML = `Failed to load reports. <a href="#" onclick="renderReports();return false;" style="color:var(--blue)">Retry</a>`;
  }
}

function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('ticker-input').value = '';
  document.getElementById('modal-status').textContent = '';
  document.getElementById('modal-go-btn').disabled = false;
  document.getElementById('ticker-input').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

async function triggerWorkflow(workflowFile, inputs={}) {
  const token = getGhToken();
  if (!token) throw new Error('No GitHub token provided. Click Run New Report and paste your PAT.');
  const res = await fetch(
    `https://api.github.com/repos/${GH_REPO}/actions/workflows/${workflowFile}/dispatches`,
    { method:'POST',
      headers:{ 'Authorization':`token ${token}`, 'Content-Type':'application/json',
                'Accept':'application/vnd.github.v3+json' },
      body: JSON.stringify({ ref:'main', inputs }) }
  );
  if (!res.ok) {
    const body = await res.text().catch(()=>'');
    let hint = '';
    if (res.status === 401) hint = ' — Bad token. Use "Reset Token" and try again.';
    else if (res.status === 403) hint = ' — Token missing "workflow" scope. Go to github.com/settings/tokens, edit your token, and check the "workflow" checkbox.';
    else if (res.status === 404) hint = ' — Repo or workflow not found.';
    throw new Error(`GitHub API error ${res.status}${hint}\n${body}`);
  }
}

async function pollForCompletion(setStatus, workflowFile='research-desk.yml', timeoutMs=300000) {
  const token = getGhToken();
  await sleep(10000);
  const triggerTime = Date.now();
  const deadline = triggerTime + timeoutMs;
  while (Date.now() < deadline) {
    const res = await fetch(
      `https://api.github.com/repos/${GH_REPO}/actions/workflows/${workflowFile}/runs?event=workflow_dispatch&per_page=5`,
      { headers:{ 'Authorization':`token ${token}`, 'Accept':'application/vnd.github.v3+json' } }
    );
    const runs = (await res.json()).workflow_runs || [];
    const run = runs.find(r => new Date(r.created_at).getTime() >= triggerTime - 30000) || runs[0];
    if (!run) { await sleep(5000); continue; }
    setStatus(`Running analysis… (${run.status})`);
    if (run.status === 'completed') {
      if (run.conclusion === 'success') return { ok:true, logUrl:run.html_url };
      return { ok:false, logUrl:run.html_url, conclusion:run.conclusion };
    }
    await sleep(5000);
  }
  return { ok:false, logUrl:`https://github.com/${GH_REPO}/actions`, conclusion:'timeout' };
}

async function startReport() {
  const ticker = document.getElementById('ticker-input').value.trim().toUpperCase();
  if (!ticker) return;
  const statusEl = document.getElementById('modal-status');
  const goBtn = document.getElementById('modal-go-btn');
  const setStatus = msg => { statusEl.innerHTML = msg; };

  goBtn.disabled = true;
  const setError = msg => {
    statusEl.innerHTML = `<div style="background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:6px;padding:8px 12px;font-size:12px;margin-bottom:4px;">${msg}</div>`;
  };
  try {
    setStatus('Triggering report generation…');
    await triggerWorkflow('research-desk.yml', { ticker });
    setStatus('Running analysis… (~90s). Keep this window open.');
    const result = await pollForCompletion(setStatus, 'research-desk.yml');
    if (!result.ok) {
      setError(`❌ Failed (${result.conclusion}) — <a href="${result.logUrl}" target="_blank" style="color:#991b1b;font-weight:600;">View error log →</a>`);
      goBtn.disabled = false;
      return;
    }
    setStatus('✅ Done! Loading new report…');
    await sleep(2000);
    closeModal();
    await renderReports();
  } catch(e) {
    setError('Error: ' + (e.message || String(e)));
    goBtn.disabled = false;
  }
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('DOMContentLoaded', renderReports);
</script>
</body>
</html>
