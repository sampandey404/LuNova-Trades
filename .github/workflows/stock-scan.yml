name: Stock Picks Scan

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas ta finviz requests

      - name: Run scan
        run: python scripts/stock_scan.py
        env:
          ADANOS_API_KEY: ${{ secrets.ADANOS_API_KEY }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/tools/stock-picks/results.json
          git diff --cached --quiet || git commit -m "Stock scan $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
