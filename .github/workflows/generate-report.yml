name: Generate Research Desk Report

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Stock ticker (e.g. AAPL, NVDA, HOOD)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tradingview_ta yfinance requests

      - name: Generate report
        run: python scripts/generate_report.py "${{ github.event.inputs.ticker }}"
        env:
          ADANOS_API_KEY: ${{ secrets.ADANOS_API_KEY }}

      - name: Commit report HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/tools/research-desk/
          git diff --cached --quiet || git commit -m "Research Desk: ${{ github.event.inputs.ticker }} $(date +'%Y-%m-%d')"
          git push
