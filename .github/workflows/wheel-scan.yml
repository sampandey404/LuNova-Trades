name: Wheel Tracker Scan

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance scipy

      - name: Run scan
        run: python scripts/wheel_scan.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/tools/wheel-tracker/wheel-results.json
          git diff --cached --quiet || git commit -m "Wheel scan $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
