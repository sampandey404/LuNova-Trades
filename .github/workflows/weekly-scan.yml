name: Weekly Stock Picks Scan

on:
  schedule:
    - cron: '0 12 * * 0'   # Every Sunday at noon UTC
  workflow_dispatch:         # Manual trigger anytime

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install finviz tradingview_ta yfinance requests

      - name: Run scan
        run: python scripts/scan.py
        env:
          ADANOS_API_KEY: ${{ secrets.ADANOS_API_KEY }}

      - name: Commit results.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/tools/stock-picks/results.json
          git diff --cached --quiet || git commit -m "Weekly scan $(date +'%Y-%m-%d')"
          git push
